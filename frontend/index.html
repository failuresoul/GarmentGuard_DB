<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GarmentGuard - Login</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">GarmentGuard</h1>
        <p class="login-subtitle">RMG Compliance System</p>
      </div>
      
      <div id="error-message" style="display: none; background-color: rgba(226, 75, 74, 0.15); border: 1px solid var(--red); color: var(--red); padding: 12px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; font-weight: 500; text-align: center;"></div>
      
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="password-input-wrapper">
            <input class="form-control" type="password" id="password" required autocomplete="current-password">
            <button type="button" class="password-toggle" id="password-toggle">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
      </form>
    </div>
  </div>

  <script src="assets/js/toast.js"></script>
  <script src="assets/js/table-utils.js"></script>
  <script src="assets/js/validate.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('password-toggle');
    const eyeIcon = document.getElementById('eye-icon');
    const errorMessage = document.getElementById('error-message');

    passwordToggle.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      eyeIcon.innerHTML = isPassword 
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const isUserValid = validateInput(usernameInput, isNotEmpty, 'Username is required');
      const isPassValid = validateInput(passwordInput, isNotEmpty, 'Password is required');
      
      if (!isUserValid || !isPassValid) {
        return;
      }
      
      errorMessage.style.display = 'none';
      
      fetch('/backend/auth/login.php', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          username: usernameInput.value,
          password: passwordInput.value
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          showToast('Login successful', 'success');
          setTimeout(() => {
            window.location.href = '/frontend/' + data.redirect;
          }, 800);
        } else {
          errorMessage.innerText = data.message;
          errorMessage.style.display = 'block';
          showToast(data.message, 'error');
        }
      })
      .catch(err => {
        errorMessage.innerText = 'Network error occurred. Please try again.';
        errorMessage.style.display = 'block';
        showToast('Connection failed', 'error');
      });
    });
  </script>
</body>
</html>
